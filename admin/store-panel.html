<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Products</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }
        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 8px 12px;
            font-size: 13px;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #1e293b;
        }
        .btn-secondary:hover {
            background: #cbd5e1;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(37, 99, 235, 0.2);
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .table-container {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: #f1f5f9;
            border-bottom: 2px solid #e2e8f0;
        }
        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
        }
        td {
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
        }
        tr:hover {
            background: #f8fafc;
        }
        .product-image {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            background: #e2e8f0;
        }
        .product-title {
            font-weight: 600;
            color: #1e293b;
        }
        .product-meta {
            font-size: 13px;
            color: #64748b;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
        }
        .badge-album {
            background: #dbeafe;
            color: #1e40af;
        }
        .badge-single {
            background: #fce7f3;
            color: #be185d;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        .btn-edit {
            background: #3b82f6;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
        }
        .btn-edit:hover {
            background: #2563eb;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #64748b;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #1e293b;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .success-msg {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 48px;
            color: #cbd5e1;
            margin-bottom: 16px;
        }
        .empty-state p {
            color: #64748b;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Store Products</h1>
            <button class="btn btn-primary" id="addProductBtn">
                <i class="ph-fill ph-plus"></i> Add Product
            </button>
        </div>

        <div id="successMsg" class="success-msg"></div>
        <div id="errorMsg" class="error-msg"></div>

        <div id="loadingState" class="loading">
            <div class="spinner"></div>
        </div>

        <div id="tableState" style="display: none;">
            <div class="table-container">
                <table id="productsTable">
                    <thead>
                        <tr>
                            <th></th>
                            <th>Title</th>
                            <th>Artist</th>
                            <th>Type</th>
                            <th>Format</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="emptyState" style="display: none;">
            <div class="empty-state">
                <i class="ph-fill ph-inbox"></i>
                <p>No products yet. Create your first product to get started.</p>
                <button class="btn btn-primary" id="addProductBtnEmpty">
                    <i class="ph-fill ph-plus"></i> Add Product
                </button>
            </div>
        </div>
    </div>

    <!-- Edit/Add Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Product</h2>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>

            <div id="modalErrorMsg" class="error-msg"></div>

            <form id="productForm">
                <div class="form-group">
                    <label for="productTitle">Title</label>
                    <input type="text" id="productTitle" required placeholder="Product title">
                </div>

                <div class="form-group">
                    <label for="productArtist">Artist</label>
                    <input type="text" id="productArtist" required placeholder="Artist name">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="productType">Type</label>
                        <select id="productType" required>
                            <option value="">Select type</option>
                            <option value="album">Album</option>
                            <option value="single">Single</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="productFormat">Format</label>
                        <select id="productFormat" required>
                            <option value="">Select format</option>
                            <option value="cd">CD</option>
                            <option value="vinyl">Vinyl</option>
                            <option value="cassette">Cassette</option>
                            <option value="digital">Digital</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="productImage">Image URL</label>
                    <input type="url" id="productImage" placeholder="https://example.com/image.jpg">
                </div>

                <div class="form-group">
                    <label for="productSearch">Search Keywords</label>
                    <input type="text" id="productSearch" placeholder="Keywords for search">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('admin_token');

        function isTokenValid(t) {
            try {
                return JSON.parse(atob(t)).exp > Date.now();
            } catch (err) {
                return false;
            }
        }

        if (!token || !isTokenValid(token)) {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
            window.location.replace('/admin/');
            throw new Error('Session invalid — redirecting to login');
        }

        const loadingState = document.getElementById('loadingState');
        const tableState = document.getElementById('tableState');
        const emptyState = document.getElementById('emptyState');
        const productsBody = document.getElementById('productsBody');
        const productModal = document.getElementById('productModal');
        const productForm = document.getElementById('productForm');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');
        const modalErrorMsg = document.getElementById('modalErrorMsg');

        let products = [];
        let collections = [];
        let currentEditId = null;

        // Load products on page load
        loadProducts();

        async function loadProducts() {
            try {
                // Load from the API (live Blob data); fall back to the static file.
                let response = await fetch('/api/content/store', { cache: 'no-store' });
                if (!response.ok) response = await fetch('/data/store.json', { cache: 'no-store' });
                const data = await response.json();
                products = data.products || [];
                collections = data.collections || [];

                loadingState.style.display = 'none';

                if (products.length === 0) {
                    emptyState.style.display = 'block';
                    tableState.style.display = 'none';
                } else {
                    tableState.style.display = 'block';
                    emptyState.style.display = 'none';
                    renderProducts();
                }
            } catch (err) {
                loadingState.style.display = 'none';
                showError('Failed to load products');
            }
        }

        function renderProducts() {
            productsBody.innerHTML = products.map(product => `
                <tr>
                    <td><img src="${product.image}" alt="" class="product-image" onerror="this.src='https://via.placeholder.com/40'"></td>
                    <td>
                        <div class="product-title">${product.title}</div>
                        <div class="product-meta">${product.id}</div>
                    </td>
                    <td>${product.artist}</td>
                    <td><span class="badge badge-${product.type}">${product.type}</span></td>
                    <td><span class="badge">${product.format}</span></td>
                    <td>
                        <div class="actions">
                            <button class="btn btn-edit" onclick="editProduct('${product.id}')">Edit</button>
                            <button class="btn btn-danger" onclick="deleteProduct('${product.id}')">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Modal controls
        document.getElementById('addProductBtn').addEventListener('click', openModal);
        document.getElementById('addProductBtnEmpty').addEventListener('click', openModal);
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('cancelBtn').addEventListener('click', closeModal);

        function openModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'Add Product';
            productForm.reset();
            modalErrorMsg.style.display = 'none';
            productModal.classList.add('active');
        }

        function closeModal() {
            productModal.classList.remove('active');
            productForm.reset();
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            currentEditId = id;
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('productTitle').value = product.title;
            document.getElementById('productArtist').value = product.artist;
            document.getElementById('productType').value = product.type;
            document.getElementById('productFormat').value = product.format;
            document.getElementById('productImage').value = product.image;
            document.getElementById('productSearch').value = product.search;
            modalErrorMsg.style.display = 'none';
            productModal.classList.add('active');
        }

        function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            products = products.filter(p => p.id !== id);
            saveProducts();
        }

        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                title: document.getElementById('productTitle').value,
                artist: document.getElementById('productArtist').value,
                type: document.getElementById('productType').value,
                format: document.getElementById('productFormat').value,
                image: document.getElementById('productImage').value,
                search: document.getElementById('productSearch').value
            };

            if (/unsplash\.com\/photos\//.test(formData.image)) {
                showModalError('That is a link to an Unsplash page, not an image. Right-click the photo, choose "Copy image address" and paste a URL starting with https://images.unsplash.com/');
                return;
            }

            if (currentEditId) {
                // Update existing product
                const idx = products.findIndex(p => p.id === currentEditId);
                if (idx !== -1) {
                    products[idx] = { id: currentEditId, ...formData };
                }
            } else {
                // Add new product
                const id = formData.title.toLowerCase().replace(/\s+/g, '-');
                products.push({ id, ...formData });
            }

            saveProducts();
        });

        async function saveProducts() {
            try {
                const response = await fetch('/api/content/store', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ products, collections })
                });

                if (response.ok) {
                    closeModal();
                    loadProducts();
                    showSuccess('Product saved successfully');
                } else if (response.status === 401) {
                    localStorage.removeItem('admin_token');
                    localStorage.removeItem('admin_user');
                    alert('Your session has expired. Please log in again.');
                    window.location.href = '/admin/';
                } else {
                    const data = await response.json().catch(() => ({}));
                    showModalError('Failed to save product' + (data.message ? ': ' + data.message : ''));
                }
            } catch (err) {
                showModalError('Error saving product');
            }
        }

        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.style.display = 'block';
            setTimeout(() => successMsg.style.display = 'none', 4000);
        }

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }

        function showModalError(message) {
            modalErrorMsg.textContent = message;
            modalErrorMsg.style.display = 'block';
        }

        // Close modal when clicking outside
        productModal.addEventListener('click', (e) => {
            if (e.target === productModal) closeModal();
        });
    </script>
</body>
</html>
